<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#0D1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="App Leo" />
    <link rel="manifest" href="/NewAppLeo/manifest.json" />
    <link rel="icon" type="image/png" href="/NewAppLeo/favicon.png" />
    <link rel="shortcut icon" href="/NewAppLeo/favicon.ico" />
    <link rel="apple-touch-icon" href="/NewAppLeo/apple-touch-icon.png" />
    <title>App Leo</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        margin: 0;
      }
      #root {
        display: flex;
        flex: 1;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Capture beforeinstallprompt before React mounts — the event fires once and is lost
      // if no listener is attached early. Components read window.__pwaInstallPrompt on mount.
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/NewAppLeo/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
