name: Documentation

on:
  push:
    branches: ["main"]
    paths:
      - src/**
      - app/**
      - package.json
  pull_request:
    paths:
      - docs/**
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Generate API documentation
        run: |
          mkdir -p docs/api

          # Document component structure
          cat > docs/api/components.md << 'EOF'
          # UI Components Documentation

          This document provides an overview of the custom UI components available in AppLeo.

          ## Components

          ### Theme Components
          - **ThemeCustomizer**: Theme selection and customization interface
          - **ThemeQuickSettings**: Quick theme switching widget
          - **DataImporter**: JSON data import interface
          - **BackgroundPhotoSelector**: Background photo upload and management

          ### Base UI Components
          - **Button**: Primary action button with theme support
          - **Card**: Container component with elevation and spacing
          - **Toggle**: Animated on/off switch
          - **ColorSwatch**: Color display component
          - **SectionHeader**: Section title with optional actions
          - **ButtonGroup**: Grouped button layout

          Generated on: $(date -u +%Y-%m-%d\ %H:%M:%S)
          EOF

      - name: Generate architecture documentation
        run: |
          mkdir -p docs/architecture
          cat > docs/architecture/project-structure.md << 'EOF'
          # Project Structure

          ## Directory Organization

          ```
          src/
          |- components/      # React components
          |- context/         # Context providers
          |- hooks/           # Custom React hooks
          |- lib/             # Business logic & services
          |- services/        # External service integrations
          |- theme.ts         # Design system tokens
          `- types/           # TypeScript type definitions

          app/
          |- (app)/           # Main app navigation
          |- (auth)/          # Authentication flows
          `- _layout.tsx      # Root layout

          .github/
          `- workflows/       # GitHub Actions
          ```

          ## Key Technologies
          - React Native + Expo 54
          - TypeScript
          - Reanimated 4
          - Firebase
          - React Router (Expo Router)

          Updated: $(date -u +%Y-%m-%d\ %H:%M:%S)
          EOF

      - name: Generate workflow documentation
        run: |
          mkdir -p docs/workflows
          cat > docs/workflows/ci-cd.md << 'EOF'
          # CI/CD Workflows

          ## Available Workflows

          ### Deploy (`deploy.yml`)
          - Triggers on: Push to main branch
          - Actions: Build -> Export -> Deploy to GitHub Pages
          - Requires: Firebase environment secrets

          ### Build (`build.yml`)
          - Triggers on: PR and push to main/develop
          - Actions: Matrix test (Node 18 & 20)
          - Artifacts: 5-day retention

          ### Lint (`lint.yml`)
          - Triggers on: Push and PR
          - Actions: Type check, security audit, secret scan

          ### PR (`pr.yml`)
          - Triggers on: Pull request events
          - Actions: Title validation, build check, comments

          ### Test (`test.yml`)
          - Triggers on: Push and PR
          - Actions: Linting, type checking, console detection

          ### Release (`release.yml`)
          - Triggers on: Version bump in package.json
          - Actions: Automatic release creation with tags

          ### Scheduled (`scheduled.yml`)
          - Triggers on: Weekly (Sunday 00:00 UTC)
          - Actions: Dependency check, health verification

          Last updated: $(date -u +%Y-%m-%d\ %H:%M:%S)
          EOF

      - name: Update API documentation
        run: |
          cat > docs/API.md << 'EOF'
          # AppLeo API Documentation

          ## Data Formats

          ### Feed Entry
          \`\`\`json
          {
            "amountMl": number,
            "dateISO": string (ISO 8601),
            "source": "bottle" | "breast" | "formula",
            "bottleStartISO"?: string,
            "bottleEndISO"?: string,
            "durationSec"?: number
          }
          \`\`\`

          ### Diaper Entry
          \`\`\`json
          {
            "kind": "wet" | "dirty" | "mixed",
            "dateISO": string (ISO 8601),
            "notes"?: string
          }
          \`\`\`

          ### Sleep Entry
          \`\`\`json
          {
            "durationSec": number,
            "dateISO": string (ISO 8601),
            "startISO": string,
            "endISO": string,
            "location"?: string
          }
          \`\`\`

          ## Theme Palettes
          - Sage
          - Rose
          - Navy
          - Sand

          Last updated: $(date -u +%Y-%m-%d\ %H:%M:%S)
          EOF

      - name: Documentation generation summary
        if: always()
        run: |
          echo "Documentation files generated in CI (no auto-push)." >> $GITHUB_STEP_SUMMARY

      - name: PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Documentation Check**:\n- [API Docs](../docs/API.md)\n- [Architecture](../docs/architecture/project-structure.md)\n- [Workflows](../docs/workflows/ci-cd.md)'
            });

