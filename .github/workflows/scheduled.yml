name: Scheduled Maintenance

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC
  workflow_dispatch:

# Grants GITHUB_TOKEN permission to open issues (fixes 403 "Resource not accessible by integration"
# when the repo default is read-only). If issues still fail, set the repository to allow
# read/write workflows: Settings → Actions → General → Workflow permissions.
permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Check for outdated dependencies
        id: outdated
        run: |
          OUTPUT=$(npm outdated || true)
          echo "outdated<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue if outdated
        uses: actions/github-script@v7
        if: steps.outdated.outputs.outdated != ''
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Dependency Update Check',
              body: `## Weekly Dependency Check\n\n\`\`\`\n${{ steps.outdated.outputs.outdated }}\n\`\`\`\n\nPlease review and update as needed.`,
            });

  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for stale branches
        run: |
          echo "Checking for stale branches (>30 days old, excluding protected branches)..."
          git fetch -q --prune

      - name: Repository statistics
        run: |
          echo "## Repository Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commits: $(git rev-list --all --count)" >> $GITHUB_STEP_SUMMARY
          echo "- Branches: $(git branch -r | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Latest commit: $(git log -1 --format='%h by %an at %ai')" >> $GITHUB_STEP_SUMMARY

  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Verify critical files exist
        run: |
          FILES=(
            "package.json"
            "tsconfig.json"
            ".github/workflows/deploy.yml"
            "src/theme.ts"
            "app/(app)/(tabs)/home.tsx"
          )

          for file in "${FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing critical file: $file"
              exit 1
            fi
          done

          echo "✅ All critical files present"

  report:
    runs-on: ubuntu-latest
    needs: [dependency-check, cleanup, health-check]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "# Weekly Maintenance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup | ${{ needs.cleanup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
