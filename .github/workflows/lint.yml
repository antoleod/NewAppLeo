name: Lint & Code Quality

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Check for unused imports
        run: |
          echo "Checking TypeScript files for potential issues..."
          npx tsc --noEmit || true

      - name: Verify file structure
        run: |
          echo "✓ Checking required directories exist..."
          test -d src && echo "✓ src/" || echo "✗ src/ missing"
          test -d app && echo "✓ app/" || echo "✗ app/ missing"
          test -f package.json && echo "✓ package.json" || echo "✗ package.json missing"
          test -f tsconfig.json && echo "✓ tsconfig.json" || echo "✗ tsconfig.json missing"

      - name: Check for environment variables
        run: |
          echo "Verifying .env.example exists..."
          test -f .env.example && echo "✓ .env.example found" || echo "⚠ .env.example not found"

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          git grep -i "api.key\|secret\|password" -- '*.ts' '*.tsx' '*.js' || echo "No obvious secrets found"
