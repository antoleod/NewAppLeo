name: Lint & Code Quality

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Check for unused imports
        run: |
          echo "Checking TypeScript files for potential issues..."
          npx tsc --noEmit || true

      - name: Verify file structure
        run: |
          echo "Checking required directories exist..."
          test -d src && echo "[OK] src/" || echo "[FAIL] src/ missing"
          test -d app && echo "[OK] app/" || echo "[FAIL] app/ missing"
          test -f package.json && echo "[OK] package.json" || echo "[FAIL] package.json missing"
          test -f tsconfig.json && echo "[OK] tsconfig.json" || echo "[FAIL] tsconfig.json missing"

      - name: Check for environment variables
        run: |
          echo "Verifying .env.example exists..."
          test -f .env.example && echo "[OK] .env.example found" || echo "[WARN] .env.example not found"

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          git grep -i "api.key\|secret\|password" -- '*.ts' '*.tsx' '*.js' || echo "No obvious secrets found"

