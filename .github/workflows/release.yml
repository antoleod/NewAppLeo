name: Release & Tagging

on:
  push:
    branches: ["main"]
    paths:
      - package.json
      - src/**
      - app/**
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should-release: ${{ steps.version.outputs.should-release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PACKAGE_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          CURRENT_VERSION="${INPUT_VERSION:-$PACKAGE_VERSION}"
          RELEASE_TAG="v$CURRENT_VERSION"

          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [ -z "$CURRENT_VERSION" ]; then
            echo "should-release=false" >> $GITHUB_OUTPUT
          elif git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should-release=false" >> $GITHUB_OUTPUT
          else
            echo "should-release=true" >> $GITHUB_OUTPUT
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Release tag: $RELEASE_TAG"

  create-release:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: |
            # Release v${{ needs.check-version.outputs.version }}

            See [CHANGELOG](./CHANGELOG.md) for details.

            **Deployment**: Automatic deploy to GitHub Pages will start shortly.
          draft: false
          prerelease: false
          allowUpdates: true
