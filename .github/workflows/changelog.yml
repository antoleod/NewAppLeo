name: Changelog & Versioning

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pull request title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            // Conventional Commits pattern
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert)(\(.+\))?!?: /;

            if (!pattern.test(title)) {
              core.setFailed(
                `Invalid PR title format.\n\n` +
                `Expected format: type(scope): description\n` +
                `Example: feat(theme): add new color palette\n\n` +
                `Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, revert`
              );
            } else {
              console.log('✅ PR title format is valid');
            }

      - name: Generate changelog entry
        id: changelog
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          # Extract type and description
          TYPE=$(echo "$PR_TITLE" | sed 's/^\([a-z]*\).*/\1/')
          DESC=$(echo "$PR_TITLE" | sed 's/^[a-z]*(\([^)]*\))?!?: //' | sed 's/^[a-z]*!?: //')

          EMOJI=""
          case "$TYPE" in
            feat) EMOJI="✨" ;;
            fix) EMOJI="🐛" ;;
            docs) EMOJI="📚" ;;
            style) EMOJI="🎨" ;;
            refactor) EMOJI="♻️" ;;
            perf) EMOJI="⚡" ;;
            test) EMOJI="✅" ;;
            chore) EMOJI="🔧" ;;
            ci) EMOJI="🤖" ;;
            revert) EMOJI="⏮️" ;;
            *) EMOJI="📝" ;;
          esac

          ENTRY="$EMOJI $DESC ([#$PR_NUMBER]($PR_URL)) - @$PR_AUTHOR"

          echo "entry=$ENTRY" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Comment changelog entry
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📋 Changelog Entry\n\n```\n${{ steps.changelog.outputs.entry }}\n```\n\nThis entry will be added to CHANGELOG.md when merged.'
            });

  suggest-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          CURRENT=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')

          # Parse semantic version
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3 | cut -d- -f1)

          # Suggest next versions
          NEXT_PATCH="$MAJOR.$MINOR.$((PATCH+1))"
          NEXT_MINOR="$MAJOR.$((MINOR+1)).0"
          NEXT_MAJOR="$((MAJOR+1)).0.0"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_patch=$NEXT_PATCH" >> $GITHUB_OUTPUT
          echo "next_minor=$NEXT_MINOR" >> $GITHUB_OUTPUT
          echo "next_major=$NEXT_MAJOR" >> $GITHUB_OUTPUT

      - name: Comment version suggestion
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🏷️ Version Suggestion\n\n**Current**: v${{ steps.version.outputs.current }}\n\n**Suggested**:\n- Patch: `${{ steps.version.outputs.next_patch }}`\n- Minor: `${{ steps.version.outputs.next_minor }}`\n- Major: `${{ steps.version.outputs.next_major }}`'
            });

  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if package.json changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 | grep -q "package.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Flag dependency changes
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Dependency Changes Detected**\n\nPlease ensure:\n- [ ] All new packages are necessary\n- [ ] No security vulnerabilities\n- [ ] Versions are properly locked\n- [ ] package-lock.json is included'
            });

  generate-release-notes:
    if: contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')

          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"- %s (%h)")
          fi

          cat > /tmp/release-notes.md << EOF
          ## Release v$VERSION

          ### Changes
          $COMMITS

          ### Contributors
          $(git log --pretty=format:"%an" | sort | uniq | sed 's/^/- /')

          Generated: $(date -u +%Y-%m-%d\ %H:%M:%S)
          EOF

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cat /tmp/release-notes.md

      - name: Comment release notes
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📝 Release Notes Preview\n\nSee PR description for full details.'
            });
