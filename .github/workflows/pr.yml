name: Pull Request Checks

on:
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Check PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          # Check if title follows convention (optional but recommended)
          if [[ "$TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\(.+\))?!?:\ .+ ]]; then
            echo "[OK] PR title follows conventional commits"
          else
            echo "[WARN] PR title doesn't follow conventional commits (optional)"
          fi

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Verify changes
        run: |
          echo "Files changed:"
          git diff --name-only origin/main HEAD | head -20

          # Check for large files
          echo ""
          echo "Checking for large files..."
          git diff --name-only origin/main HEAD | while read file; do
            [ -f "$file" ] && SIZE=$(wc -c < "$file") && [ "$SIZE" -gt 5242880 ] && echo "[WARN] Large file: $file ($(($SIZE / 1024 / 1024))MB)"
          done || true

      - name: Build test
        run: npm run build
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildExists = fs.existsSync('./dist');
            const status = buildExists ? '[OK] Build successful' : '[FAIL] Build failed';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## PR Validation\n\n${status}\n\nPlease ensure all checks pass before merging.`
            });

