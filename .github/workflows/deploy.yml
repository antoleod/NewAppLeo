name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Build Web
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Inject PWA meta tags (guaranteed fallback)
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const html = fs.readFileSync('dist/index.html', 'utf8');

          // Skip if tags are already injected by +html.tsx
          if (html.includes('apple-mobile-web-app-capable')) {
            console.log('PWA meta tags already present (injected by +html.tsx)');
            process.exit(0);
          }

          const tags = `
            <meta name="theme-color" content="#0D1117" />
            <meta name="mobile-web-app-capable" content="yes" />
            <link rel="manifest" href="/NewAppLeo/manifest.json" />
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
            <meta name="apple-mobile-web-app-title" content="App Leo" />
            <link rel="apple-touch-icon" href="/NewAppLeo/apple-touch-icon.png" />
            <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/NewAppLeo/sw.js').catch(function(){});});}</script>`;

          const injected = html.replace('</head>', tags + '\n  </head>');
          fs.writeFileSync('dist/index.html', injected);
          console.log('PWA meta tags injected successfully');
          EOF

      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
