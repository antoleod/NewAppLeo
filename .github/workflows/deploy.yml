name: Deploy to GitHub Pages (Public Repo)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Deploy dist/ to public repo gh-pages branch
        run: |
          # Configure git identity for the push commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Enter the compiled output folder — this is the ONLY thing that will be pushed
          cd dist

          # Create a fresh git repo containing only the compiled output
          git init
          git checkout -b gh-pages
          git add -A

          # Stamp the source commit SHA so deployments are traceable without exposing source
          git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC') (src: ${{ github.sha }})"

          # Force-push to the public repo's gh-pages branch using the PAT
          # Nothing outside dist/ is ever pushed — the repo above has no remote and no history
          git push --force \
            "https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/antoleod/NewAppLeo.git" \
            gh-pages
