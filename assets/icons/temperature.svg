<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thermometer bulb -->
  <circle cx="32" cy="52" r="8" fill="url(#tempGrad)" stroke="#E74C3C" stroke-width="2"/>
  <!-- Thermometer stem -->
  <rect x="28" y="8" width="8" height="44" rx="4" fill="none" stroke="#E74C3C" stroke-width="2"/>
  <!-- Mercury level -->
  <rect x="29" y="28" width="6" height="24" rx="3" fill="url(#tempGrad)"/>
  <!-- Indicator lines -->
  <line x1="24" y1="20" x2="40" y2="20" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="2"/>
  <line x1="24" y1="32" x2="40" y2="32" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="2"/>
  <line x1="24" y1="44" x2="40" y2="44" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="2"/>
  <defs>
    <linearGradient id="tempGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>